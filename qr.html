<!DOCTYPE html>
<html lang="kz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dailizza · QR код жасау</title>
<style>
  :root{
    --green:#1f8a3a; --green-2:#16a34a; --green-3:#0e6e2e; --green-soft:#e6f4ea;
    --line:#e1ecdf; --shadow:0 8px 24px rgba(15,71,38,.08);
  }
  *{box-sizing:border-box}
  body{
    font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
    margin:0; min-height:100vh; padding:30px 16px;
    background:linear-gradient(135deg,#f4faf5 0%, #d6ebda 100%);
    color:#0f2417;
  }
  .wrap{max-width:560px;margin:0 auto;background:#fff;border-radius:24px;box-shadow:var(--shadow);padding:28px}
  .head{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .logo{width:54px;height:54px;border-radius:50%;background:#fff;box-shadow:var(--shadow);overflow:hidden}
  .logo img{width:100%;height:100%;object-fit:cover}
  h1{margin:0;font-size:22px;font-weight:900}
  p.sub{margin:4px 0 0;color:#5e6f64;font-size:14px}

  label{font-weight:700;font-size:13px;display:block;margin:14px 0 6px}
  input[type=text]{
    width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;
    font-size:16px;outline:none;font-family:inherit;
  }
  input[type=text]:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(31,138,58,.12)}

  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  button{
    flex:1;min-width:140px;padding:14px;border-radius:12px;border:none;
    font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;
    background:linear-gradient(135deg,var(--green),var(--green-2));color:#fff;
    min-height:50px;
  }
  button:hover{transform:translateY(-1px);transition:.15s}
  button.alt{background:var(--green-soft);color:var(--green-3)}

  .qr-box{
    margin:24px auto 0;padding:24px;background:#f7fbf8;border-radius:18px;
    display:grid;place-items:center;min-height:340px;
  }
  .qr-box img{max-width:100%;border-radius:12px;background:#fff;padding:12px;box-shadow:var(--shadow)}
  .hint{color:#5e6f64;font-size:13px;text-align:center;margin-top:14px;line-height:1.5}
  .hint code{background:#e6f4ea;padding:2px 8px;border-radius:6px;color:var(--green-3);font-weight:700}
  .err{color:#c0392b;font-size:13px;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo"><img src="дейлиза%20логотип.PNG" alt="Dailizza"></div>
    <div>
      <h1>QR код жасау</h1>
      <p class="sub">Сайт сілтемесін енгізіңіз → QR код алыңыз</p>
    </div>
  </div>

  <label for="url">Сайт сілтемесі (URL)</label>
  <input id="url" type="text" placeholder="https://dailizza.kz" value="https://dailizza.kz">

  <div class="row">
    <button id="gen">QR жасау</button>
    <button id="dl" class="alt" disabled>📥 Жүктеп алу (PNG)</button>
  </div>

  <div class="qr-box">
    <img id="qrimg" alt="QR" style="display:none">
    <div id="qrPlaceholder" style="color:#8aa097;font-size:14px">QR осы жерде шығады</div>
  </div>

  <p class="hint">
    💡 Алдымен сайтты интернетке жариялаңыз (мысалы: <code>Netlify</code>, <code>Vercel</code>, <code>GitHub Pages</code> — тегін),
    сосын сол сайттың сілтемесін енгізіңіз. Клиенттер QR-ды сканерлегенде бірден сайтыңызға кіреді.
  </p>
  <div id="err" class="err"></div>
</div>

<script>
const $ = s => document.querySelector(s);

async function generate(){
  const url = $("#url").value.trim();
  $("#err").textContent = "";
  if(!url){ $("#err").textContent = "Сілтеме енгізіңіз"; return; }
  // QR арқылы api.qrserver.com (тегін, лимитсіз)
  const src = `https://api.qrserver.com/v1/create-qr-code/?size=600x600&margin=20&ecc=H&color=1f8a3a&data=${encodeURIComponent(url)}`;
  const img = $("#qrimg");
  $("#qrPlaceholder").style.display = "none";
  img.style.display = "block";
  img.src = src;
  try{
    const r = await fetch(src);
    if(!r.ok) throw new Error("network");
    const blob = await r.blob();
    const dlBtn = $("#dl");
    dlBtn.disabled = false;
    dlBtn.onclick = ()=>{
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "dailizza-qr.png";
      a.click();
      setTimeout(()=> URL.revokeObjectURL(a.href), 4000);
    };
  } catch(e){
    $("#err").textContent = "Интернет жоқ. QR онлайн жасалады.";
  }
}

$("#gen").onclick = generate;
$("#url").addEventListener("keydown", e=>{ if(e.key==="Enter") generate(); });
// автоматты түрде бастапқы URL-мен жасау
generate();
</script>
</body>
</html>
